<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>派单匹配看板</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b1120;
      --panel: #151f32;
      --border: #2a3a55;
      --text: #f1f5f9;
      --muted: #8b9cb8;
      --ok: #22c55e;
      --ok-bg: rgba(34,197,94,.12);
      --fail: #ef4444;
      --fail-bg: rgba(239,68,68,.12);
      --warn: #f59e0b;
      --primary: #6366f1;
    }
    body {
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 70% 50% at 10% 0%, rgba(99,102,241,.18), transparent),
                  radial-gradient(ellipse 50% 40% at 90% 100%, rgba(34,197,94,.08), transparent);
      pointer-events: none; z-index: 0;
    }
    .wrap { max-width: 1440px; margin: 0 auto; padding: 20px 24px 40px; position: relative; z-index: 1; }

    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .topbar h1 { font-size: 1.35rem; font-weight: 800; }
    .topbar .sub { color: var(--muted); font-size: 0.82rem; margin-top: 2px; }

    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    @media (max-width: 800px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }
    .stat-card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 16px; text-align: center;
    }
    .stat-card .num { font-size: 1.8rem; font-weight: 800; line-height: 1.1; }
    .stat-card .lbl { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
    .stat-card.ok .num { color: var(--ok); }
    .stat-card.fail .num { color: var(--fail); }
    .stat-card.info .num { color: #a5b4fc; }

    .layout { display: grid; grid-template-columns: 340px 1fr; gap: 16px; align-items: start; }
    @media (max-width: 960px) { .layout { grid-template-columns: 1fr; } }

    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .panel-head {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      font-weight: 700; font-size: 0.9rem;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(0,0,0,.2);
    }
    .scroll { max-height: calc(100vh - 280px); overflow-y: auto; }
    .scroll::-webkit-scrollbar { width: 5px; }
    .scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

    .co-item {
      display: flex; gap: 10px; padding: 11px 14px; border-bottom: 1px solid rgba(42,58,85,.6);
      cursor: pointer; transition: background .15s;
    }
    .co-item:hover { background: rgba(99,102,241,.06); }
    .co-item.checked { background: rgba(99,102,241,.1); border-left: 3px solid var(--primary); }
    .co-item input { margin-top: 3px; accent-color: var(--primary); }
    .co-name { font-weight: 600; font-size: 0.86rem; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .source-tag {
      font-size: 0.62rem; padding: 1px 6px; border-radius: 4px; font-weight: 600;
      background: rgba(245,158,11,.2); color: #fbbf24; flex-shrink: 0;
    }
    .co-meta { font-size: 0.74rem; color: var(--muted); margin-top: 2px; }

    .link { background: none; border: none; color: #a5b4fc; cursor: pointer; font-size: 0.82rem; }

    /* 看板分区 */
    .board-section { margin-bottom: 0; }
    .section-hd {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; font-weight: 700; font-size: 0.88rem;
      position: sticky; top: 0; z-index: 2;
    }
    .section-hd.ok { background: rgba(34,197,94,.15); color: #86efac; border-bottom: 1px solid rgba(34,197,94,.25); }
    .section-hd.fail { background: rgba(239,68,68,.15); color: #fca5a5; border-bottom: 1px solid rgba(239,68,68,.25); }
    .section-count {
      font-size: 0.72rem; padding: 2px 8px; border-radius: 10px;
      background: rgba(0,0,0,.25); font-weight: 600;
    }

    /* 派单行 */
    .dispatch-row { border-bottom: 1px solid rgba(42,58,85,.5); }
    .dispatch-row.row-ok { background: var(--ok-bg); }
    .dispatch-row.row-fail { background: var(--fail-bg); }
    .dispatch-row.row-manual { box-shadow: inset 0 0 0 1px rgba(245,158,11,.35); }
    .dispatch-row.row-dup { box-shadow: inset 0 0 0 1px rgba(239,68,68,.5); }

    .row-grid {
      display: grid;
      grid-template-columns: 28px minmax(140px,1.4fr) 24px minmax(120px,1fr) 90px 64px;
      gap: 8px; align-items: center; padding: 10px 14px;
    }
    @media (max-width: 1100px) {
      .row-grid { grid-template-columns: 24px 1fr 20px 1fr 72px 56px; }
    }

    .status-dot {
      width: 10px; height: 10px; border-radius: 50%; margin: 0 auto;
    }
    .status-dot.ok { background: var(--ok); box-shadow: 0 0 8px rgba(34,197,94,.6); }
    .status-dot.fail { background: var(--fail); box-shadow: 0 0 8px rgba(239,68,68,.6); }

    .cell-company .name { font-weight: 700; font-size: 0.86rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cell-company .sub { font-size: 0.72rem; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .cell-arrow { text-align: center; color: #64748b; font-weight: 700; }

    .emp-select {
      width: 100%; padding: 6px 8px; border-radius: 8px;
      background: rgba(15,23,42,.7); border: 1px solid var(--border);
      color: var(--text); font-size: 0.82rem; font-weight: 600; cursor: pointer;
    }

    /* 员工选择器：含出发地 + 标签 */
    .emp-picker { position: relative; width: 100%; }
    .emp-picker-btn {
      width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 6px;
      padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border);
      background: rgba(15,23,42,.7); color: var(--text); font-size: 0.82rem; font-weight: 600;
      cursor: pointer; text-align: left;
    }
    .emp-picker-btn:hover:not(:disabled) { border-color: var(--primary); }
    .emp-picker-btn:disabled { opacity: .5; cursor: not-allowed; }
    .emp-picker.open .emp-picker-btn { border-color: var(--primary); background: rgba(99,102,241,.12); }
    .picker-sub { font-size: 0.68rem; color: var(--muted); font-weight: 400; margin-top: 1px; }
    .picker-arrow { font-size: 0.6rem; color: var(--muted); flex-shrink: 0; }

    .emp-picker-panel {
      position: absolute; left: 0; right: 0; top: calc(100% + 4px); z-index: 50;
      background: #0f172a; border: 1px solid var(--primary); border-radius: 10px;
      box-shadow: 0 12px 40px rgba(0,0,0,.5); max-height: 320px; display: flex; flex-direction: column;
    }
    .emp-picker-panel[hidden] { display: none; }
    .emp-search {
      margin: 8px; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border);
      background: rgba(15,23,42,.8); color: var(--text); font-size: 0.8rem;
    }
    .emp-search:focus { outline: none; border-color: var(--primary); }
    .emp-picker-list { overflow-y: auto; padding: 0 6px 6px; }
    .emp-option {
      padding: 8px 10px; border-radius: 8px; cursor: pointer; margin-bottom: 4px;
      border: 1px solid transparent; transition: background .12s;
    }
    .emp-option:hover:not(.disabled) { background: rgba(99,102,241,.12); border-color: rgba(99,102,241,.25); }
    .emp-option.selected { background: rgba(34,197,94,.1); border-color: rgba(34,197,94,.3); }
    .emp-option.disabled { opacity: .45; cursor: not-allowed; }
    .emp-option-top { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .emp-option-name { font-weight: 700; font-size: 0.84rem; }
    .emp-taken { font-size: 0.65rem; color: #fca5a5; background: rgba(239,68,68,.15); padding: 1px 6px; border-radius: 4px; }
    .emp-option-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .etag {
      font-size: 0.62rem; padding: 1px 6px; border-radius: 4px;
      background: rgba(99,102,241,.2); color: #c4b5fd;
    }
    .emp-option-dep { font-size: 0.7rem; color: var(--muted); margin-top: 4px; line-height: 1.35; }

    .commute-big.commute-ok { color: #4ade80; }
    .commute-big.commute-warn { color: #fbbf24; }
    .commute-hint { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .manual-tag {
      display: inline-block; font-size: 0.65rem; padding: 1px 6px; border-radius: 4px;
      background: rgba(245,158,11,.2); color: #fbbf24; margin-top: 3px;
    }

    .cell-commute { text-align: center; }
    .commute-big {
      font-size: 1.5rem; font-weight: 800; color: #a5b4fc; line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .commute-unit { font-size: 0.7rem; color: var(--muted); }
    .commute-src { font-size: 0.62rem; color: #64748b; margin-top: 1px; }
    .commute-none { font-size: 1.1rem; color: #64748b; font-weight: 600; }

    .btn-ghost {
      padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 0.75rem; cursor: pointer;
    }
    .btn-ghost:hover { border-color: var(--primary); color: #c4b5fd; }
    .btn-ghost.open { background: rgba(99,102,241,.15); color: #c4b5fd; border-color: var(--primary); }

    .row-expand {
      padding: 0 14px 12px 42px; font-size: 0.78rem;
      border-top: 1px dashed rgba(99,102,241,.15);
      background: rgba(0,0,0,.15);
    }
    .row-expand[hidden] { display: none; }
    .route-line { color: #a5b4fc; margin: 6px 0; line-height: 1.45; }
    .rules-collapse { margin-top: 8px; }
    .rules-toggle {
      display: flex; align-items: center; gap: 6px; width: 100%;
      padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border);
      background: rgba(15,23,42,.5); color: #a5b4fc; font-size: 0.74rem;
      font-weight: 600; cursor: pointer; text-align: left;
    }
    .rules-toggle:hover { border-color: var(--primary); }
    .rules-toggle .arrow { margin-left: auto; font-size: 0.65rem; color: var(--muted); }
    .rules-body { margin-top: 6px; padding-left: 4px; }
    .rules-body[hidden] { display: none; }

    .chip {
      font-size: 0.68rem; padding: 2px 7px; border-radius: 4px;
    }
    .chip.pass { background: rgba(34,197,94,.15); color: #86efac; }
    .chip.fail { background: rgba(239,68,68,.15); color: #fca5a5; }
    .chip.ref { background: rgba(100,116,139,.15); color: #94a3b8; }
    .rule-chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .fail-reason { color: #fca5a5; margin-top: 4px; }

    .toolbar { display: flex; gap: 10px; align-items: center; }
    button {
      padding: 9px 20px; border: none; border-radius: 10px; cursor: pointer;
      font-size: 0.88rem; font-weight: 600;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff;
    }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary.loading { animation: pulse .9s infinite; }
    @keyframes pulse { 50% { opacity: .65; } }

    .empty { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 0.88rem; }
    .thinking { padding: 48px 20px; text-align: center; color: #a5b4fc; font-size: 0.88rem; }

    .page-loader {
      position: fixed; inset: 0; background: var(--bg); z-index: 200;
      display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px;
      transition: opacity .3s, visibility .3s;
    }
    .page-loader.hide { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader-ring {
      width: 40px; height: 40px; border: 3px solid rgba(99,102,241,.2);
      border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--panel); border: 1px solid var(--primary); color: var(--text);
      padding: 10px 20px; border-radius: 10px; font-size: 0.86rem; z-index: 99;
    }

    .btn-secondary {
      background: rgba(99,102,241,.15); color: #c4b5fd; border: 1px solid rgba(99,102,241,.35);
    }
    .btn-secondary:hover { background: rgba(99,102,241,.25); }

    .view-tabs { display: flex; gap: 4px; }
    .view-tab {
      padding: 4px 12px; border-radius: 6px; border: 1px solid transparent;
      background: transparent; color: var(--muted); font-size: 0.78rem; font-weight: 600; cursor: pointer;
    }
    .view-tab.active { background: rgba(99,102,241,.2); color: #c4b5fd; border-color: rgba(99,102,241,.35); }

    .schedule-card {
      margin: 10px 14px; padding: 12px 14px; border-radius: 10px;
      border: 1px solid var(--border); background: rgba(15,23,42,.5);
    }
    .schedule-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .schedule-name { font-weight: 800; font-size: 0.92rem; }
    .schedule-meta { font-size: 0.72rem; color: var(--muted); }
    .schedule-stats { display: flex; gap: 8px; font-size: 0.7rem; color: #a5b4fc; }
    .schedule-order {
      display: grid; grid-template-columns: 56px 1fr auto; gap: 8px; align-items: center;
      padding: 8px 0; border-top: 1px dashed rgba(42,58,85,.6);
    }
    .schedule-order:first-of-type { border-top: none; }
    .slot-tag {
      font-size: 0.68rem; padding: 2px 8px; border-radius: 4px;
      background: rgba(99,102,241,.2); color: #c4b5fd; text-align: center;
    }
    .route-seg {
      font-size: 0.72rem; color: var(--muted); padding: 4px 0 0 64px;
    }
    .route-seg span { color: #a5b4fc; }
  </style>
</head>
<body>
  <div class="page-loader" id="page-loader">
    <div class="loader-ring"></div>
    <div>加载派单数据...</div>
  </div>

  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>派单匹配看板</h1>
        <div class="sub">原始 Excel 数据 + 演示数据同一系统 · 演示项带标签 · 已匹配不重复计算</div>
      </div>
      <div class="toolbar">
        <button class="btn-secondary" id="showcase-btn">一键演示匹配</button>
        <button class="btn-primary" id="dispatch-btn" disabled>重新 AI 匹配</button>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-card info"><div class="num" id="stat-selected">0</div><div class="lbl">已选公司</div></div>
      <div class="stat-card ok"><div class="num" id="stat-matched">0</div><div class="lbl">匹配成功</div></div>
      <div class="stat-card fail"><div class="num" id="stat-failed">0</div><div class="lbl">匹配失败</div></div>
      <div class="stat-card info"><div class="num" id="stat-commute">—</div><div class="lbl">平均通勤(分)</div></div>
    </div>

    <div class="layout">
      <div class="panel">
        <div class="panel-head">
          选择公司
          <button class="link" id="sel-all-co">全选</button>
        </div>
        <div class="scroll" id="company-list"></div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="view-tabs">
            <button class="view-tab active" id="tab-results" data-view="results">派单结果</button>
            <button class="view-tab" id="tab-schedules" data-view="schedules">员工行程</button>
          </div>
          <span id="distance-tag" style="font-size:0.72rem;color:var(--muted)">通勤上限 60 分钟</span>
        </div>
        <div class="scroll" id="dispatch-board">
          <div class="empty">勾选左侧公司，AI 将自动匹配并在此展示结果</div>
        </div>
        <div class="scroll" id="schedule-board" hidden>
          <div class="empty">匹配成功后，可在此查看每位员工的当日行程</div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>
  <script src="/match.js"></script>
</body>
</html>
