<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>派单匹配看板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060912;
      --panel: rgba(18, 24, 42, 0.72);
      --panel-solid: #12182a;
      --border: rgba(99, 102, 241, 0.18);
      --text: #f1f5f9;
      --muted: #8b9cb8;
      --ok: #34d399;
      --ok-bg: rgba(52, 211, 153, 0.08);
      --fail: #f87171;
      --fail-bg: rgba(248, 113, 113, 0.08);
      --warn: #fbbf24;
      --primary: #818cf8;
      --glow: rgba(99, 102, 241, 0.45);
    }
    body {
      font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% -10%, rgba(99,102,241,.22), transparent 55%),
        radial-gradient(ellipse 60% 50% at 85% 110%, rgba(52,211,153,.12), transparent 50%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(139,92,246,.06), transparent);
      pointer-events: none; z-index: 0;
      animation: meshShift 18s ease-in-out infinite alternate;
    }
    @keyframes meshShift {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0.85; transform: scale(1.05); }
    }
    .wrap { max-width: 1440px; margin: 0 auto; padding: 20px 24px 40px; position: relative; z-index: 1; }

    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .topbar h1 {
      font-size: 1.4rem; font-weight: 800;
      background: linear-gradient(135deg, #e0e7ff 0%, #a5b4fc 50%, #34d399 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .topbar .sub { color: var(--muted); font-size: 0.82rem; margin-top: 4px; }
    .ai-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.68rem; font-weight: 700; color: #c4b5fd;
      background: rgba(99,102,241,.15); border: 1px solid rgba(99,102,241,.3);
      padding: 3px 10px; border-radius: 999px; margin-top: 8px;
    }
    .ai-badge .dot {
      width: 6px; height: 6px; border-radius: 50%; background: #34d399;
      box-shadow: 0 0 8px #34d399; animation: pulseDot 2s ease-in-out infinite;
    }
    @keyframes pulseDot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }

    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    @media (max-width: 800px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }
    .stat-card {
      background: var(--panel); backdrop-filter: blur(16px);
      border: 1px solid var(--border); border-radius: 14px;
      padding: 16px; text-align: center;
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
      animation: fadeUp .5s ease both;
    }
    .stat-card:nth-child(1){animation-delay:.05s}
    .stat-card:nth-child(2){animation-delay:.1s}
    .stat-card:nth-child(3){animation-delay:.15s}
    .stat-card:nth-child(4){animation-delay:.2s}
    .stat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(99,102,241,.15); border-color: rgba(99,102,241,.35); }
    .stat-card .num { font-size: 1.9rem; font-weight: 800; line-height: 1.1; }
    .stat-card .lbl { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }
    .stat-card.ok .num { color: var(--ok); text-shadow: 0 0 20px rgba(52,211,153,.3); }
    .stat-card.fail .num { color: var(--fail); }
    .stat-card.info .num { color: #a5b4fc; }

    .layout { display: grid; grid-template-columns: 340px 1fr; gap: 16px; align-items: start; }
    @media (max-width: 960px) { .layout { grid-template-columns: 1fr; } }

    .panel {
      background: var(--panel); backdrop-filter: blur(20px);
      border: 1px solid var(--border); border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,.25);
      animation: fadeUp .6s ease both;
    }
    .layout .panel:nth-child(2) { animation-delay: .1s; }
    .panel-head {
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      font-weight: 700; font-size: 0.9rem;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(0,0,0,.25);
    }
    .scroll {
      max-height: calc(100vh - 280px); overflow-y: auto; overflow-x: hidden;
      padding: 12px;
    }
    .scroll::-webkit-scrollbar { width: 6px; }
    .scroll::-webkit-scrollbar-thumb { background: rgba(99,102,241,.35); border-radius: 3px; }

    .co-item {
      display: flex; gap: 10px; padding: 12px 14px; margin-bottom: 6px;
      border-radius: 10px; border: 1px solid transparent;
      cursor: pointer; transition: all .2s ease;
    }
    .co-item:hover { background: rgba(99,102,241,.08); border-color: rgba(99,102,241,.2); transform: translateX(3px); }
    .co-item.checked {
      background: rgba(99,102,241,.12); border-color: rgba(99,102,241,.35);
      box-shadow: 0 0 16px rgba(99,102,241,.1);
    }
    .co-item input { margin-top: 3px; accent-color: var(--primary); }
    .co-name { font-weight: 600; font-size: 0.86rem; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .source-tag {
      font-size: 0.62rem; padding: 2px 7px; border-radius: 4px; font-weight: 600;
      background: rgba(245,158,11,.2); color: #fbbf24; flex-shrink: 0;
    }
    .co-meta { font-size: 0.74rem; color: var(--muted); margin-top: 3px; }
    .link {
      background: none; border: none; color: #a5b4fc; cursor: pointer; font-size: 0.82rem;
      transition: color .2s;
    }
    .link:hover { color: #c4b5fd; }

    /* 看板分区 — 修复遮挡：取消 sticky，独立分区 */
    .board-section { margin-bottom: 16px; }
    .board-section:last-child { margin-bottom: 0; }
    .section-hd {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 10px 14px; margin-bottom: 10px;
      font-weight: 700; font-size: 0.84rem;
      border-radius: 10px;
      position: relative; z-index: 1;
    }
    .section-hd.ok {
      background: linear-gradient(135deg, rgba(52,211,153,.18), rgba(52,211,153,.06));
      color: #6ee7b7; border: 1px solid rgba(52,211,153,.25);
    }
    .section-hd.fail {
      background: linear-gradient(135deg, rgba(248,113,113,.18), rgba(248,113,113,.06));
      color: #fca5a5; border: 1px solid rgba(248,113,113,.25);
    }
    .section-count {
      font-size: 0.72rem; padding: 3px 10px; border-radius: 999px;
      background: rgba(0,0,0,.3); font-weight: 600; flex-shrink: 0;
    }
    .section-body { display: flex; flex-direction: column; gap: 10px; overflow: visible; }

    /* 派单行 — 卡片式 */
    .dispatch-row {
      border-radius: 12px; border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.5);
      overflow: visible;
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    }
    .dispatch-row:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(0,0,0,.2); }
    .dispatch-row.row-ok { border-color: rgba(52,211,153,.2); background: var(--ok-bg); }
    .dispatch-row.row-fail { border-color: rgba(248,113,113,.2); background: var(--fail-bg); }
    .dispatch-row.row-manual { box-shadow: inset 0 0 0 1px rgba(245,158,11,.4); }
    .dispatch-row.row-enter { animation: rowEnter .45s ease both; }

    @keyframes rowEnter {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .row-grid {
      display: grid;
      grid-template-columns: 28px minmax(140px,1.4fr) 24px minmax(120px,1fr) 90px 88px;
      gap: 10px; align-items: center; padding: 14px 16px;
    }
    @media (max-width: 1100px) {
      .row-grid { grid-template-columns: 24px 1fr 20px 1fr 72px 80px; }
    }

    .status-dot { width: 10px; height: 10px; border-radius: 50%; margin: 0 auto; flex-shrink: 0; }
    .status-dot.ok { background: var(--ok); box-shadow: 0 0 10px rgba(52,211,153,.7); animation: pulseDot 2.5s ease-in-out infinite; }
    .status-dot.fail { background: var(--fail); box-shadow: 0 0 10px rgba(248,113,113,.7); }

    .cell-company { min-width: 0; }
    .cell-company .name { font-weight: 700; font-size: 0.88rem; line-height: 1.35; word-break: break-all; }
    .cell-company .sub { font-size: 0.72rem; color: var(--muted); margin-top: 3px; line-height: 1.4; }

    .cell-arrow { text-align: center; color: #64748b; font-weight: 700; font-size: 1.1rem; }

    .emp-picker { position: relative; width: 100%; z-index: 10; }
    .emp-picker.open { z-index: 100; }
    .emp-picker-btn {
      width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 6px;
      padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border);
      background: rgba(15,23,42,.8); color: var(--text); font-size: 0.82rem; font-weight: 600;
      cursor: pointer; text-align: left; transition: all .2s ease;
    }
    .emp-picker-btn:hover:not(:disabled) { border-color: var(--primary); box-shadow: 0 0 12px rgba(99,102,241,.2); }
    .emp-picker-btn:disabled { opacity: .5; cursor: not-allowed; }
    .emp-picker.open .emp-picker-btn { border-color: var(--primary); background: rgba(99,102,241,.15); }
    .picker-sub { font-size: 0.68rem; color: var(--muted); font-weight: 400; margin-top: 2px; }
    .picker-arrow { font-size: 0.6rem; color: var(--muted); flex-shrink: 0; transition: transform .2s; }
    .emp-picker.open .picker-arrow { transform: rotate(180deg); }

    .emp-picker-panel {
      position: fixed; z-index: 9999;
      background: rgba(12, 18, 36, 0.98); backdrop-filter: blur(16px);
      border: 1px solid rgba(99,102,241,.4); border-radius: 12px;
      box-shadow: 0 16px 48px rgba(0,0,0,.5); max-height: 320px;
      display: flex; flex-direction: column;
      animation: panelDrop .2s ease;
    }
    @keyframes panelDrop {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .emp-picker-panel[hidden] { display: none; }
    .emp-search {
      margin: 10px; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
      background: rgba(15,23,42,.8); color: var(--text); font-size: 0.82rem;
      transition: border-color .2s, box-shadow .2s;
    }
    .emp-search:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,.15); }
    .emp-picker-list { overflow-y: auto; padding: 0 8px 8px; min-height: 80px; max-height: 240px; flex: 1; }
    .emp-option {
      padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px;
      border: 1px solid transparent; transition: all .15s ease;
    }
    .emp-option:hover:not(.disabled) { background: rgba(99,102,241,.12); border-color: rgba(99,102,241,.25); transform: translateX(2px); }
    .emp-option.selected { background: rgba(52,211,153,.1); border-color: rgba(52,211,153,.3); }
    .emp-option.disabled { opacity: .4; cursor: not-allowed; }
    .emp-option-top { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .emp-option-name { font-weight: 700; font-size: 0.84rem; }
    .emp-taken { font-size: 0.65rem; color: #fca5a5; background: rgba(248,113,113,.15); padding: 2px 7px; border-radius: 4px; }
    .emp-option-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
    .etag { font-size: 0.62rem; padding: 2px 7px; border-radius: 4px; background: rgba(99,102,241,.2); color: #c4b5fd; }
    .emp-option-dep { font-size: 0.7rem; color: var(--muted); margin-top: 4px; line-height: 1.35; }

    .commute-big.commute-ok { color: #4ade80; text-shadow: 0 0 16px rgba(74,222,128,.3); }
    .commute-big.commute-warn { color: #fbbf24; }
    .commute-hint { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }
    .manual-tag {
      display: inline-block; font-size: 0.65rem; padding: 2px 7px; border-radius: 4px;
      background: rgba(245,158,11,.2); color: #fbbf24; margin-top: 4px;
    }
    .manual-tag.hint-tag {
      background: rgba(99,102,241,.15); color: #a5b4fc;
    }
    .manual-tag.clear-tag {
      background: rgba(100,116,139,.2); color: #94a3b8;
    }

    .manual-hint {
      display: flex; align-items: flex-start; gap: 8px;
      margin: 0 0 10px; padding: 10px 12px; border-radius: 10px;
      background: rgba(99,102,241,.1); border: 1px solid rgba(99,102,241,.25);
      font-size: 0.78rem; color: #c4b5fd; line-height: 1.5;
    }
    .manual-hint-icon { flex-shrink: 0; font-size: 1rem; }
    .manual-hint strong { color: #e9d5ff; font-weight: 600; }
    .manual-hint .manual-count { color: #fbbf24; font-weight: 600; }

    .emp-option.clear-option {
      border-bottom: 1px dashed var(--border);
      margin-bottom: 4px;
      color: #94a3b8;
    }
    .emp-option.clear-option:hover { background: rgba(239,68,68,.1); color: #fca5a5; }

    .dispatch-row.row-pending { opacity: .92; }

    .cell-commute { text-align: center; }
    .commute-big { font-size: 1.6rem; font-weight: 800; color: #a5b4fc; line-height: 1; font-variant-numeric: tabular-nums; }
    .commute-unit { font-size: 0.7rem; color: var(--muted); }
    .commute-src { font-size: 0.62rem; color: #64748b; margin-top: 2px; }
    .commute-none { font-size: 1.1rem; color: #64748b; font-weight: 600; }

    .btn-ghost {
      padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 0.75rem; cursor: pointer;
      transition: all .2s ease;
    }
    .btn-ghost:hover { border-color: var(--primary); color: #c4b5fd; background: rgba(99,102,241,.1); }
    .btn-ghost.open { background: rgba(99,102,241,.18); color: #c4b5fd; border-color: var(--primary); }

    .row-expand {
      padding: 12px 16px 14px 54px; font-size: 0.78rem;
      border-top: 1px dashed rgba(99,102,241,.15);
      background: rgba(0,0,0,.2);
      animation: expandIn .25s ease;
      border-radius: 0 0 12px 12px;
      overflow: hidden;
    }

    .manual-panel {
      margin-bottom: 10px; border-radius: 10px;
      background: rgba(15,23,42,.6); border: 1px solid var(--border);
      overflow: hidden;
    }
    .manual-panel-hd {
      display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap;
      padding: 10px 12px; border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,.2);
    }
    .manual-panel-hd .title { font-size: 0.82rem; font-weight: 700; color: #c4b5fd; }
    .manual-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .manual-actions .btn-sm {
      padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
      background: rgba(99,102,241,.2); color: #c4b5fd; font-size: 0.75rem; font-weight: 600;
      cursor: pointer; white-space: nowrap;
    }
    .manual-actions .btn-sm:hover { background: rgba(99,102,241,.35); }
    .manual-actions .btn-sm.primary { background: linear-gradient(135deg, var(--primary), #7c3aed); color: #fff; border: none; }
    .manual-tables {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0;
    }
    @media (max-width: 900px) { .manual-tables { grid-template-columns: 1fr; } }
    .manual-table-wrap {
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; min-height: 0;
    }
    .manual-table-wrap:last-child { border-right: none; }
    @media (max-width: 900px) {
      .manual-table-wrap { border-right: none; border-bottom: 1px solid var(--border); }
      .manual-table-wrap:last-child { border-bottom: none; }
    }
    .manual-table-hd {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; font-size: 0.75rem; font-weight: 600; color: var(--muted);
    }
    .manual-table-hd .count {
      font-size: 0.68rem; padding: 2px 8px; border-radius: 999px;
      background: rgba(99,102,241,.2); color: #c4b5fd;
    }
    .manual-search {
      margin: 0 10px 8px; padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border);
      background: rgba(15,23,42,.9); color: var(--text); font-size: 0.78rem;
    }
    .manual-search:focus { outline: none; border-color: var(--primary); }
    .manual-table-scroll {
      max-height: 200px; overflow-y: auto; padding: 0 8px 8px;
    }
    .manual-table-scroll::-webkit-scrollbar { width: 5px; }
    .manual-table-scroll::-webkit-scrollbar-thumb { background: rgba(99,102,241,.35); border-radius: 3px; }
    .manual-table {
      width: 100%; border-collapse: collapse; font-size: 0.76rem;
    }
    .manual-table th {
      position: sticky; top: 0; z-index: 1;
      background: rgba(12,18,36,.98); color: var(--muted); font-weight: 600;
      padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border);
    }
    .manual-table td {
      padding: 7px 8px; border-bottom: 1px solid rgba(99,102,241,.08);
      vertical-align: middle;
    }
    .manual-table tr { cursor: pointer; transition: background .15s; }
    .manual-table tbody tr:hover { background: rgba(99,102,241,.08); }
    .manual-table tr.selected { background: rgba(99,102,241,.15); }
    .manual-table tr.selected td { color: #e0e7ff; }
    .manual-table .co-name-cell { font-weight: 600; max-width: 160px; word-break: break-all; }
    .manual-table .sub-cell { font-size: 0.68rem; color: var(--muted); }
    .manual-table input[type="checkbox"] { accent-color: var(--primary); cursor: pointer; }

    .emp-modal-overlay {
      position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .emp-modal-overlay[hidden] { display: none; }
    .emp-modal {
      width: min(420px, 100%); background: var(--panel); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px; box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }
    .emp-modal h3 { margin: 0 0 12px; font-size: 1.1rem; }
    .emp-modal .info-row { display: flex; gap: 8px; margin-bottom: 8px; font-size: 0.82rem; }
    .emp-modal .info-row .k { color: var(--muted); min-width: 72px; flex-shrink: 0; }
    .emp-modal .info-row .v { color: var(--text); word-break: break-all; }
    .emp-modal .close-btn {
      margin-top: 14px; width: 100%; padding: 8px; border-radius: 8px;
      border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer;
    }
    .cell-action { display: flex; gap: 4px; justify-content: flex-end; flex-wrap: wrap; }
    .btn-emp-info {
      padding: 4px 8px; font-size: 0.68rem; border-radius: 6px;
      border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer;
    }
    .btn-emp-info:hover { border-color: var(--primary); color: #c4b5fd; }
    @keyframes expandIn { from { opacity: 0; } to { opacity: 1; } }
    .row-expand[hidden] { display: none; }
    .route-line { color: #a5b4fc; margin: 6px 0; line-height: 1.45; }
    .rules-collapse { margin-top: 8px; }
    .rules-toggle {
      display: flex; align-items: center; gap: 6px; width: 100%;
      padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
      background: rgba(15,23,42,.5); color: #a5b4fc; font-size: 0.74rem;
      font-weight: 600; cursor: pointer; text-align: left; transition: all .2s;
    }
    .rules-toggle:hover { border-color: var(--primary); }
    .rules-toggle .arrow { margin-left: auto; font-size: 0.65rem; color: var(--muted); }
    .rules-body { margin-top: 8px; padding-left: 4px; }
    .rules-body[hidden] { display: none; }

    .chip { font-size: 0.68rem; padding: 3px 8px; border-radius: 6px; }
    .chip.pass { background: rgba(52,211,153,.15); color: #6ee7b7; }
    .chip.fail { background: rgba(248,113,113,.15); color: #fca5a5; }
    .chip.ref { background: rgba(100,116,139,.15); color: #94a3b8; }
    .rule-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .fail-reason { color: #fca5a5; margin-top: 4px; }

    .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    button {
      padding: 10px 22px; border: none; border-radius: 12px; cursor: pointer;
      font-size: 0.88rem; font-weight: 600; transition: all .25s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #6366f1);
      background-size: 200% 200%; color: #fff;
      box-shadow: 0 4px 20px rgba(99,102,241,.35);
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(99,102,241,.45); background-position: 100% 0; }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .btn-primary.loading { animation: pulse .9s infinite; }
    @keyframes pulse { 50% { opacity: .65; } }

    .empty { padding: 48px 24px; text-align: center; color: var(--muted); font-size: 0.9rem; line-height: 1.6; }

    .thinking {
      padding: 56px 24px; text-align: center; color: #a5b4fc; font-size: 0.92rem;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .ai-orbit {
      width: 48px; height: 48px; position: relative;
    }
    .ai-orbit::before, .ai-orbit::after {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      border: 2px solid transparent;
    }
    .ai-orbit::before { border-top-color: #818cf8; border-right-color: #818cf8; animation: spin .8s linear infinite; }
    .ai-orbit::after { inset: 8px; border-bottom-color: #34d399; border-left-color: #34d399; animation: spin 1.2s linear infinite reverse; }
    .thinking-dots span {
      animation: dotBlink 1.4s ease-in-out infinite;
    }
    .thinking-dots span:nth-child(2) { animation-delay: .2s; }
    .thinking-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes dotBlink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

    .page-loader {
      position: fixed; inset: 0; background: var(--bg); z-index: 200;
      display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
      transition: opacity .4s, visibility .4s;
    }
    .page-loader.hide { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader-ring {
      width: 44px; height: 44px; border: 3px solid rgba(99,102,241,.15);
      border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(18,24,42,.92); backdrop-filter: blur(12px);
      border: 1px solid rgba(99,102,241,.4); color: var(--text);
      padding: 12px 24px; border-radius: 12px; font-size: 0.86rem; z-index: 99;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s;
      opacity: 0;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .btn-secondary {
      background: rgba(99,102,241,.12); color: #c4b5fd;
      border: 1px solid rgba(99,102,241,.35);
    }
    .btn-secondary:hover { background: rgba(99,102,241,.22); transform: translateY(-1px); }
    .btn-secondary.loading { animation: pulse .9s infinite; opacity: .75; }

    .view-tabs { display: flex; gap: 6px; background: rgba(0,0,0,.2); padding: 4px; border-radius: 10px; }
    .view-tab {
      padding: 6px 14px; border-radius: 8px; border: none;
      background: transparent; color: var(--muted); font-size: 0.78rem; font-weight: 600; cursor: pointer;
      transition: all .2s ease;
    }
    .view-tab:hover { color: #c4b5fd; }
    .view-tab.active {
      background: linear-gradient(135deg, rgba(99,102,241,.3), rgba(139,92,246,.2));
      color: #e0e7ff; box-shadow: 0 2px 8px rgba(99,102,241,.2);
    }

    .schedule-card {
      margin-bottom: 12px; padding: 16px; border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(15,23,42,.45);
      transition: transform .2s, box-shadow .2s;
      animation: rowEnter .45s ease both;
    }
    .schedule-card:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(99,102,241,.12); }
    .schedule-hd { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 12px; flex-wrap: wrap; }
    .schedule-name { font-weight: 800; font-size: 0.95rem; }
    .schedule-meta { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }
    .schedule-stats { display: flex; flex-wrap: wrap; gap: 8px; font-size: 0.7rem; color: #a5b4fc; }
    .schedule-order {
      display: grid; grid-template-columns: 56px 1fr auto; gap: 10px; align-items: center;
      padding: 10px 0; border-top: 1px dashed rgba(42,58,85,.5);
    }
    .schedule-order:first-of-type { border-top: none; }
    .slot-tag {
      font-size: 0.68rem; padding: 4px 10px; border-radius: 6px;
      background: rgba(99,102,241,.2); color: #c4b5fd; text-align: center;
    }
    .route-seg { font-size: 0.72rem; color: var(--muted); padding: 4px 0 0 66px; }
    .route-seg span { color: #a5b4fc; }

    #emp-picker-portal { position: fixed; z-index: 10001; min-width: 240px; }
    .emp-dep-line { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 0.7rem; margin-top: 4px; }
    .emp-dep-line .emp-dep { color: var(--muted); flex: 1; min-width: 0; word-break: break-all; }
    .emp-dep-line .emp-slot { color: #a5b4fc; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
    .manual-tag.fail-reason-tag { background: rgba(248,113,113,.2); color: #fca5a5; }
    .page-nav { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .nav-link {
      padding: 8px 16px; border-radius: 10px; font-size: 0.82rem; font-weight: 600;
      text-decoration: none; color: #c4b5fd; border: 1px solid rgba(99,102,241,.35);
      background: rgba(99,102,241,.12); transition: all .2s;
    }
    .nav-link:hover { background: rgba(99,102,241,.25); transform: translateY(-1px); }
    .nav-link.active { background: linear-gradient(135deg, var(--primary), #7c3aed); color: #fff; border-color: transparent; }
    .ai-hint {
      margin: 0 0 10px; padding: 10px 12px; border-radius: 10px;
      background: rgba(99,102,241,.1); border: 1px solid rgba(99,102,241,.25);
      font-size: 0.78rem; color: #c4b5fd; line-height: 1.5;
    }
    #distance-tag {
      font-size: 0.72rem; color: var(--muted);
      padding: 4px 10px; border-radius: 6px;
      background: rgba(99,102,241,.08); border: 1px solid rgba(99,102,241,.15);
    }
    .manual-page .manual-table-scroll { max-height: calc(100vh - 280px); }
    .manual-result { padding: 12px; max-height: 240px; overflow-y: auto; }
    .manual-result-item {
      padding: 8px 10px; margin-bottom: 6px; border-radius: 8px; font-size: 0.78rem;
      border: 1px solid var(--border); background: rgba(15,23,42,.5);
    }
    .manual-result-item.ok { border-color: rgba(52,211,153,.3); color: #6ee7b7; }
    .manual-result-item.fail { border-color: rgba(248,113,113,.3); color: #fca5a5; }
  </style>
</head>
<body>
  <div class="page-loader" id="page-loader">
    <div class="loader-ring"></div>
    <div class="loader-text">加载派单数据...</div>
  </div>

  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>派单匹配看板</h1>
        <div class="sub">AI 智能匹配 · 增量派单 · 一人多单 · 员工行程</div>
        <div class="ai-badge"><span class="dot"></span> AI 派单引擎运行中</div>
      </div>
      <div class="toolbar">
        <button class="btn-secondary" id="full-match-btn">全量匹配</button>
        <nav class="page-nav">
          <a class="nav-link" href="manual-match.html">手动派单</a>
          <a class="nav-link active" href="match.html">AI 匹配</a>
        </nav>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-card info"><div class="num" id="stat-selected">0</div><div class="lbl">已选公司</div></div>
      <div class="stat-card ok"><div class="num" id="stat-matched">0</div><div class="lbl">匹配成功</div></div>
      <div class="stat-card fail"><div class="num" id="stat-failed">0</div><div class="lbl">匹配失败</div></div>
      <div class="stat-card info"><div class="num" id="stat-commute">—</div><div class="lbl">平均通勤(分)</div></div>
    </div>

    <div class="layout">
      <div class="panel">
        <div class="panel-head">
          选择公司
          <button class="link" id="sel-all-co">全选</button>
        </div>
        <div class="scroll" id="company-list"></div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="view-tabs">
            <button class="view-tab active" id="tab-results" data-view="results">派单结果</button>
            <button class="view-tab" id="tab-schedules" data-view="schedules">员工行程</button>
          </div>
          <span id="distance-tag">通勤上限 60 分钟</span>
        </div>
        <div class="ai-hint" id="manual-hint">
          勾选左侧公司后 AI 自动匹配；点击每行<strong>选择员工</strong>下拉可改派，合规指派将<strong>锁定</strong>。手动批量派单请前往 <a href="manual-match.html" style="color:#e9d5ff">手动派单页</a>。
        </div>
        <div class="scroll" id="dispatch-board">
          <div class="empty">勾选左侧公司，AI 将自动匹配并在此展示结果</div>
        </div>
        <div class="scroll" id="schedule-board" hidden>
          <div class="empty">匹配成功后，可在此查看每位员工的当日行程</div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>
  <div class="emp-modal-overlay" id="emp-modal" hidden>
    <div class="emp-modal">
      <h3 id="emp-modal-title">员工信息</h3>
      <div id="emp-modal-body"></div>
      <button type="button" class="close-btn" id="emp-modal-close">关闭</button>
    </div>
  </div>
  <script src="/match-shared.js"></script>
  <script src="/match.js"></script>
</body>
</html>
