server {
    listen 80;
    server_name 101.32.209.251;

    client_max_body_size 20M;
    root /opt/dispatch-system/public;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types application/json text/javascript application/javascript text/css text/plain;

    # 静态缓存直出，避免走 Node 代理
    location /cache/ {
        alias /opt/dispatch-system/public/cache/;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        access_log off;
    }

    # API 与文档走 Node
    location /api/ {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
    }

    location /docs/ {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # HTML/JS/CSS 优先 Nginx 直出；Node 重启时页面仍可打开
    location / {
        try_files $uri $uri/ @node;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri @node;
    }

    location @node {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
    }
}
